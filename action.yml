name: 'sustainable-npm'
description: '🌱 Globally sets npm configurations to optimize speed and reduce CO₂ emissions.'
author: 'John McCall'
branding:
  icon: 'package'
  color: 'green'

inputs:
  audit:
    description: >-
      Controls whether npm performs a security audit after installing packages.
      When set to false, npm will skip running the audit (default: false).
    required: false
    default: 'false'
  fund:
    description: >-
      Enables or disables funding messages from npm. When disabled, npm will not display funding prompts (default: false).
    required: false
    default: 'false'
  progress:
    description: >-
      Determines if a progress bar is displayed during npm operations.
      Disabling the progress bar can help reduce log noise in CI environments (default: false).
    required: false
    default: 'false'
  update-notifier:
    description: >-
      Configures whether npm checks for updates to itself after executing commands.
      Disabling this can reduce unnecessary network requests (default: false).
    required: false
    default: 'false'
  prefer-offline:
    description: >-
      Configures whether npm checks for staleness in cached data. Missing data will still be fetched online.
      Disabling this can reduce unnecessary network requests (default: false).
    required: false
    default: 'true'
  loglevel:
    description: >-
      Sets the logging level for npm. Valid values include: silent, error, warn, http, info, verbose, and silly.
      For streamlined output, the default is set to 'error' (default: error).
    required: false
    default: 'error'
  ignore-scripts:
    description: >-
      Prevents npm from running lifecycle scripts (e.g. postinstall) defined in packages.
      Reduces install time by skipping spawned processes, network calls, and compilations triggered by scripts.
      Also protects against supply chain attacks via malicious install scripts (default: true).
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Check for npm CLI
      shell: bash
      run: |
        # Check for npm CLI
        if ! command -v npm &> /dev/null; then
          echo "Error: npm CLI not found. Did you forget to run `actions/setup-node` first?"
          exit 1
        fi

    - name: Set npm configs
      shell: bash
      env:
        INPUT_AUDIT: ${{ inputs.audit }}
        INPUT_FUND: ${{ inputs.fund }}
        INPUT_PROGRESS: ${{ inputs.progress }}
        INPUT_UPDATE_NOTIFIER: ${{ inputs['update-notifier'] }}
        INPUT_PREFER_OFFLINE: ${{ inputs['prefer-offline'] }}
        INPUT_LOGLEVEL: ${{ inputs.loglevel }}
        INPUT_IGNORE_SCRIPTS: ${{ inputs['ignore-scripts'] }}
      run: |
        # Set npm configs
        npm config set audit "$INPUT_AUDIT"
        npm config set fund "$INPUT_FUND"
        npm config set progress "$INPUT_PROGRESS"
        npm config set update-notifier "$INPUT_UPDATE_NOTIFIER"
        npm config set prefer-offline "$INPUT_PREFER_OFFLINE"
        npm config set loglevel "$INPUT_LOGLEVEL"
        npm config set ignore-scripts "$INPUT_IGNORE_SCRIPTS"

    - name: Print npm configs
      if: runner.debug
      shell: bash
      run: |
        # Print npm configs
        echo "::group::⚙️ npm config output"
        npm config list
        echo "::endgroup::"
