name: Benchmark

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  full-install:
    runs-on: [ubuntu-latest]
    strategy:
      matrix:
        sustainable-npm: [true, false]
        package-size: ['medium']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      - uses: ./
        if: ${{ matrix.sustainable-npm }}
      - name: Install dependencies
        run: |
          cd test/${{ matrix.package-size }}-package
          npm install

  benchmark:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
        package-size: ['medium']
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      - name: Install hyperfine
        run: |
          sudo apt-get update
          sudo apt-get install -y hyperfine
      - name: Cache dependencies
        run: |
          cd test/${{ matrix.package-size }}-package
          npm install
      - name: Run baseline benchmarks
        run: |
          cd test/${{ matrix.package-size }}-package
          hyperfine --warmup 2 --runs 10 "npm install" "npm install --audit=false --fund=false --loglevel=error --prefer-offline=true --update-notifier=false --progress=false"
