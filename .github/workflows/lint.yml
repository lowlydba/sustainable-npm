---
name: Lint
on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  super-linter:
    name: Lint
    permissions:
      contents: read
      packages: read # Required for package listing
      pull-requests: write # To allow PR comments from tools that use the GITHUB_TOKEN
      statuses: write # To report GitHub Actions status checks
    runs-on: [ubuntu-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check action pins
        uses: suzuki-shunsuke/pinact-action@cf51507d80d4d6522a07348e3d58790290eaf0b6 # v2.0.0
        with:
          verify: "true"
          min_age: "7"

      - uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e # v0.5.3
        with:
          advanced-security: false
          persona: pedantic

  are-we-good:
    name: Rollup
    runs-on: ubuntu-latest
    needs: [super-linter]
    if: always()
    steps:
      - uses: lowlydba/are-we-good@bb8ee9e793e4233fac1992bb880e2a28bed7f42f # v1.0.3
        with:
          jobs: ${{ toJSON(needs) }}
